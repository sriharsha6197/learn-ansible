- name: Print variable
  hosts: localhost
  become: yes
  vars:
    firstVariable : Sri
  tasks: 
    - name: variable
      ansible.builtin.debug:
        msg: "{{ firstVariable }}"

- name: task level vars
  hosts: localhost
  become: yes
  tasks:
    - name: Print task variable
      vars:
        secondVariable: Harsha
      ansible.builtin.debug:
        msg: "{{ secondVariable }}"